apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hivemind-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: hivemind.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ai-agent-demo
                port:
                  number: 80
