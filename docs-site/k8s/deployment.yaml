apiVersion: apps/v1
kind: Deployment
metadata:
  name: hivemind-docs
  labels:
    app: hivemind-docs
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hivemind-docs
  template:
    metadata:
      labels:
        app: hivemind-docs
    spec:
      containers:
        - name: docs
          image: hivemind-docs:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4321
          readinessProbe:
            httpGet:
              path: /
              port: 4321
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 4321
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
