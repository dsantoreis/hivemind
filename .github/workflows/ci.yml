name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Lint
        run: ruff check .
      - name: Unit tests
        run: pytest -q tests/test_orchestrator_logic.py --cov=src/ai_agent_demo --cov-report=xml --cov-report=term
      - name: Integration tests
        run: pytest -q tests/test_api_integration.py tests/test_fastapi_demo.py
      - name: E2E tests
        run: pytest -q tests/test_security_and_metrics.py
      - name: Coverage gate (>80%)
        run: python -m pytest --cov=src/ai_agent_demo --cov-fail-under=80 -q

  node-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run lint
      - run: npm run test:coverage

  docker-build:
    runs-on: ubuntu-latest
    needs: [python-quality, node-quality]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t hivemind:ci .
